<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>History — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    /* Cool charcoal base */
    --bg-0: oklch(0.17 0.008 260);
    --bg-1: oklch(0.205 0.009 260);
    --bg-2: oklch(0.235 0.01 260);
    --bg-3: oklch(0.275 0.011 260);
    --bg-hover: oklch(0.255 0.012 260);
    --bg-row-alt: oklch(0.195 0.009 260);

    --line-0: oklch(0.28 0.012 260);
    --line-1: oklch(0.33 0.014 260);

    --fg-0: oklch(0.96 0.005 260);
    --fg-1: oklch(0.82 0.01 260);
    --fg-2: oklch(0.62 0.012 260);
    --fg-3: oklch(0.46 0.012 260);

    /* Accents */
    --amber: oklch(0.78 0.14 75);     /* primary */
    --amber-dim: oklch(0.62 0.12 75);
    --cyan: oklch(0.78 0.12 220);
    --violet: oklch(0.72 0.16 295);
    --coral: oklch(0.72 0.16 25);
    --green: oklch(0.78 0.14 150);

    --chip: oklch(0.285 0.012 260);
    --chip-fg: oklch(0.78 0.01 260);

    --shadow-sm: 0 1px 0 rgba(255,255,255,0.02) inset, 0 1px 2px rgba(0,0,0,0.4);
    --shadow-md: 0 8px 24px rgba(0,0,0,0.35);
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: var(--bg-0);
    color: var(--fg-1);
    font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    font-size: 13px;
    line-height: 1.4;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  .mono { font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace; font-variant-numeric: tabular-nums; }

  /* ---------- Shell ---------- */
  .app {
    display: grid;
    grid-template-rows: 48px 1fr;
    height: 100vh;
    width: 100vw;
  }

  /* ---------- Top Bar ---------- */
  .topbar {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 0 14px;
    border-bottom: 1px solid var(--line-0);
    background: linear-gradient(180deg, var(--bg-1), var(--bg-0));
    gap: 16px;
  }
  .topbar-left, .topbar-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .topbar-right { justify-content: flex-end; }

  .icon-btn {
    width: 28px; height: 28px;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 6px;
    background: transparent;
    color: var(--fg-2);
    border: 1px solid transparent;
    cursor: pointer;
    transition: background .12s, color .12s, border-color .12s;
  }
  .icon-btn:hover { background: var(--bg-hover); color: var(--fg-0); }
  .icon-btn.active { color: var(--amber); }

  .search {
    position: relative;
    width: 220px;
    max-width: 32vw;
  }
  .search input {
    width: 100%;
    height: 28px;
    padding: 0 10px 0 28px;
    background: var(--bg-2);
    border: 1px solid var(--line-0);
    border-radius: 8px;
    color: var(--fg-0);
    font: inherit;
    outline: none;
    transition: border-color .12s, background .12s;
  }
  .search input::placeholder { color: var(--fg-3); }
  .search input:focus { border-color: var(--amber); background: var(--bg-1); }
  .search .sicon {
    position: absolute; left: 8px; top: 50%; transform: translateY(-50%);
    color: var(--fg-3);
  }

  .date-range {
    display: flex; align-items: center; gap: 10px;
    color: var(--fg-0);
    font-weight: 500;
    font-size: 13px;
    letter-spacing: 0.1px;
  }
  .date-range .pill {
    font-family: 'JetBrains Mono', monospace;
    color: var(--fg-1);
    padding: 4px 10px;
    background: var(--bg-2);
    border: 1px solid var(--line-0);
    border-radius: 999px;
    font-size: 12px;
    font-weight: 500;
  }
  .date-range .range-main {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--fg-0);
    letter-spacing: 0.2px;
  }

  .seg {
    display: inline-flex;
    padding: 3px;
    background: var(--bg-2);
    border: 1px solid var(--line-0);
    border-radius: 10px;
    gap: 2px;
  }
  .seg button {
    height: 22px;
    padding: 0 12px;
    border: 0;
    background: transparent;
    color: var(--fg-2);
    border-radius: 7px;
    font: inherit;
    font-weight: 500;
    font-size: 12px;
    cursor: pointer;
    transition: background .12s, color .12s;
  }
  .seg button:hover { color: var(--fg-0); }
  .seg button.on {
    background: var(--amber);
    color: oklch(0.2 0.02 75);
    box-shadow: 0 1px 0 rgba(255,255,255,0.15) inset, 0 1px 2px rgba(0,0,0,0.3);
  }

  .today-chip {
    height: 26px; padding: 0 12px;
    background: var(--bg-2);
    border: 1px solid var(--line-0);
    border-radius: 999px;
    color: var(--fg-1);
    font-size: 12px; font-weight: 500;
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .today-chip:hover { background: var(--bg-hover); color: var(--fg-0); }

  .navarrows { display: inline-flex; gap: 2px; }

  /* ---------- Main body ---------- */
  .main {
    display: grid;
    grid-template-columns: 1fr 340px;
    min-height: 0;
  }

  .content {
    display: grid;
    grid-template-rows: 32px 1fr;
    min-height: 0;
    border-right: 1px solid var(--line-0);
    background: var(--bg-0);
  }

  /* ---------- List columns ---------- */
  .col-header {
    display: grid;
    grid-template-columns: 120px 1fr 340px 80px;
    align-items: center;
    padding: 0 16px 0 14px;
    height: 32px;
    border-bottom: 1px solid var(--line-0);
    color: var(--fg-3);
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    background: var(--bg-1);
  }
  .col-header .cell { display: flex; align-items: center; gap: 6px; }
  .col-header .views { justify-content: flex-end; }
  .col-header .sortable:hover { color: var(--fg-1); cursor: pointer; }

  .list-scroll {
    overflow-y: auto;
    overflow-x: hidden;
  }
  .list-scroll::-webkit-scrollbar { width: 10px; }
  .list-scroll::-webkit-scrollbar-track { background: transparent; }
  .list-scroll::-webkit-scrollbar-thumb {
    background: var(--line-1);
    border-radius: 10px;
    border: 2px solid var(--bg-0);
  }
  .list-scroll::-webkit-scrollbar-thumb:hover { background: var(--fg-3); }

  .day-group { border-bottom: 1px solid var(--line-0); }
  .day-head {
    display: grid;
    grid-template-columns: 1fr 80px;
    align-items: center;
    padding: 10px 16px 8px 14px;
    background: var(--bg-1);
    border-bottom: 1px solid var(--line-0);
    position: sticky;
    top: 0;
    z-index: 2;
  }
  .day-head .label {
    color: var(--fg-0);
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.1px;
  }
  .day-head .total {
    text-align: right;
    color: var(--fg-2);
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
  }
  .day-head .total b {
    color: var(--fg-0);
    font-weight: 600;
    margin-left: 4px;
  }

  .row {
    display: grid;
    grid-template-columns: 120px 1fr 340px 80px;
    align-items: center;
    padding: 0 16px 0 14px;
    height: 34px;
    color: var(--fg-1);
    font-size: 13px;
    cursor: default;
    border-bottom: 1px solid transparent;
    transition: background .1s;
  }
  .row:hover { background: var(--bg-hover); }
  .row .time {
    font-family: 'JetBrains Mono', monospace;
    color: var(--fg-2);
    font-size: 12px;
    letter-spacing: 0.3px;
  }
  .row .title-cell {
    display: flex; align-items: center; gap: 10px;
    min-width: 0;
  }
  .row .fav {
    width: 16px; height: 16px;
    border-radius: 4px;
    flex-shrink: 0;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 10px;
    font-weight: 700;
    color: oklch(0.2 0.02 260);
    font-family: 'JetBrains Mono', monospace;
  }
  .row .title {
    color: var(--fg-0);
    font-size: 13px;
    font-weight: 400;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    min-width: 0;
  }
  .row .url {
    color: var(--fg-3);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    min-width: 0;
  }
  .row .views-cell {
    text-align: right;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--fg-2);
  }
  .row .views-cell .badge {
    display: inline-block;
    min-width: 22px;
    padding: 2px 6px;
    background: var(--bg-3);
    border-radius: 4px;
    color: var(--fg-1);
    font-weight: 500;
  }
  .row .views-cell .badge.hot {
    background: oklch(0.35 0.08 75);
    color: var(--amber);
  }

  /* ---------- Sidebar ---------- */
  .sidebar {
    background: var(--bg-0);
    overflow-y: auto;
    padding: 16px 18px 24px 18px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }
  .sidebar::-webkit-scrollbar { width: 10px; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--line-1); border-radius: 10px; border: 2px solid var(--bg-0); }

  .side-date {
    font-family: 'JetBrains Mono', monospace;
    color: var(--fg-0);
    font-size: 13px;
    font-weight: 500;
    margin: 0 0 2px 0;
    letter-spacing: 0.2px;
  }
  .side-section-title {
    color: var(--fg-0);
    font-size: 13px;
    font-weight: 600;
    margin: 0 0 12px 0;
    letter-spacing: 0.1px;
  }
  .side-section-title .muted { color: var(--fg-3); font-weight: 400; }

  .card {
    background: transparent;
  }

  .chart-legend {
    display: flex; flex-wrap: wrap; gap: 10px 14px;
    margin-top: 10px;
  }
  .chart-legend .item {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11px;
    color: var(--fg-2);
  }
  .chart-legend .swatch {
    width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0;
  }
  .chart-legend .item b {
    color: var(--fg-0);
    font-weight: 500;
    margin-left: 2px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* Domain list */
  .domain-row {
    display: grid;
    grid-template-columns: 16px 1fr auto;
    align-items: center;
    gap: 10px;
    height: 30px;
    color: var(--fg-1);
    font-size: 12px;
    border-bottom: 1px dashed var(--line-0);
  }
  .domain-row:last-child { border-bottom: 0; }
  .domain-row .dot {
    width: 14px; height: 14px; border-radius: 4px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 700;
    color: oklch(0.2 0.02 260);
    font-family: 'JetBrains Mono', monospace;
  }
  .domain-row .d-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--fg-1);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .domain-row .d-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--fg-2);
    background: var(--bg-2);
    padding: 2px 6px;
    border-radius: 4px;
    min-width: 24px;
    text-align: center;
  }

  /* Tweaks panel */
  .tweaks-panel {
    position: fixed;
    right: 16px;
    bottom: 16px;
    width: 260px;
    background: var(--bg-1);
    border: 1px solid var(--line-1);
    border-radius: 12px;
    box-shadow: var(--shadow-md);
    padding: 14px;
    z-index: 50;
    display: none;
  }
  .tweaks-panel.open { display: block; }
  .tweaks-panel h3 {
    margin: 0 0 10px 0;
    font-size: 12px;
    color: var(--fg-0);
    font-weight: 600;
    letter-spacing: 0.4px;
    text-transform: uppercase;
  }
  .tweak-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  .tweak-row label { font-size: 12px; color: var(--fg-2); }
  .tweak-row select, .tweak-row input[type="color"] {
    background: var(--bg-2);
    border: 1px solid var(--line-0);
    color: var(--fg-0);
    border-radius: 6px;
    padding: 4px 6px;
    font: inherit;
    font-size: 12px;
  }

  /* Tooltip */
  .tip {
    position: absolute;
    pointer-events: none;
    background: var(--bg-3);
    border: 1px solid var(--line-1);
    color: var(--fg-0);
    padding: 6px 8px;
    border-radius: 6px;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    transform: translate(-50%, -110%);
    white-space: nowrap;
    opacity: 0;
    transition: opacity .1s;
    z-index: 30;
  }
  .tip.show { opacity: 1; }

  /* Day / Week / Month empty states */
  .view-stub {
    display: flex; align-items: center; justify-content: center;
    padding: 48px;
    color: var(--fg-3);
    font-size: 13px;
  }

  /* Week grid */
  .week-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    height: 100%;
    min-height: 0;
  }
  .week-col {
    border-right: 1px solid var(--line-0);
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .week-col:last-child { border-right: 0; }
  .week-col-head {
    padding: 10px 12px;
    font-size: 11px;
    color: var(--fg-2);
    font-weight: 600;
    background: var(--bg-1);
    border-bottom: 1px solid var(--line-0);
    text-transform: none;
    letter-spacing: 0;
  }
  .week-col-head b { color: var(--fg-0); font-weight: 600; margin-right: 6px; }
  .week-col-body { flex: 1; overflow-y: auto; padding: 6px 8px; min-height: 0; }
  .week-item {
    display: grid;
    grid-template-columns: 14px 1fr auto;
    align-items: center;
    gap: 8px;
    padding: 5px 6px;
    border-radius: 5px;
    font-size: 11px;
    color: var(--fg-1);
    margin-bottom: 2px;
  }
  .week-item:hover { background: var(--bg-hover); }
  .week-item .ww-title {
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    font-size: 11px;
  }
  .week-item .ww-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--fg-3);
    background: var(--bg-2);
    border-radius: 3px;
    padding: 1px 4px;
    min-width: 18px;
    text-align: center;
  }

  /* Month grid */
  .month-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    grid-auto-rows: 1fr;
    height: 100%;
    min-height: 0;
  }
  .month-cell {
    border-right: 1px solid var(--line-0);
    border-bottom: 1px solid var(--line-0);
    padding: 8px;
    min-height: 0;
    display: flex;
    flex-direction: column;
    gap: 6px;
    overflow: hidden;
    position: relative;
  }
  .month-cell.other-month { background: oklch(0.16 0.008 260); color: var(--fg-3); }
  .month-cell .mc-date {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--fg-1);
    font-weight: 500;
  }
  .month-cell.other-month .mc-date { color: var(--fg-3); }
  .month-cell.today .mc-date {
    color: var(--amber);
    font-weight: 700;
  }
  .month-cell .mc-dot {
    background: oklch(0.32 0.08 75);
    border-left: 2px solid var(--amber);
    padding: 4px 6px;
    border-radius: 0 4px 4px 0;
    color: var(--fg-0);
    font-size: 10px;
    line-height: 1.3;
  }
  .month-cell .mc-dot.cyan {
    background: oklch(0.3 0.06 220);
    border-color: var(--cyan);
  }
  .month-weekday-head {
    padding: 6px 10px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--fg-3);
    background: var(--bg-1);
    border-bottom: 1px solid var(--line-0);
    border-right: 1px solid var(--line-0);
    font-weight: 600;
  }
  .month-wrap {
    display: grid;
    grid-template-rows: 28px 1fr;
    height: 100%;
    min-height: 0;
  }
  .month-weekday-row {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
  }
</style>
</head>
<body>

<div class="app" id="app">
  <!-- TOP BAR -->
  <header class="topbar">
    <div class="topbar-left">
      <button class="icon-btn" title="Menu" aria-label="Menu">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="5" height="5" rx="1"/><rect x="9" y="2" width="5" height="5" rx="1"/><rect x="2" y="9" width="5" height="5" rx="1"/><rect x="9" y="9" width="5" height="5" rx="1"/></svg>
      </button>
      <div class="search">
        <svg class="sicon" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="7" r="4.5"/><path d="m10.5 10.5 3 3"/></svg>
        <input id="searchInput" placeholder="Search history" />
      </div>
    </div>

    <div class="date-range">
      <span class="range-main" id="rangeLabel">3/28/2026 – 4/14/2026</span>
    </div>

    <div class="topbar-right">
      <button class="today-chip" id="todayBtn">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="12" height="11" rx="1.5"/><path d="M2 6h12M5 2v2M11 2v2"/></svg>
        <span id="todayLabel">Today</span>
      </button>
      <div class="navarrows">
        <button class="icon-btn" title="Previous" aria-label="Previous">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 3 5 8l5 5"/></svg>
        </button>
        <button class="icon-btn" title="Next" aria-label="Next">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="m6 3 5 5-5 5"/></svg>
        </button>
      </div>
      <div class="seg" id="viewSeg">
        <button data-view="list" class="on">List</button>
        <button data-view="day">Day</button>
        <button data-view="week">Week</button>
        <button data-view="month">Month</button>
      </div>
      <button class="icon-btn" id="tweaksBtn" title="Tweaks" aria-label="Tweaks">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="4" cy="4" r="1.5"/><circle cx="12" cy="12" r="1.5"/><path d="M4 5.5v8M12 2.5v8"/></svg>
      </button>
      <button class="icon-btn" title="Info" aria-label="Info">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><path d="M8 7v4M8 5.2v.1"/></svg>
      </button>
    </div>
  </header>

  <!-- MAIN -->
  <div class="main">
    <section class="content">
      <div class="col-header" id="colHeader">
        <div class="cell sortable">Date <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M2 4l3 3 3-3"/></svg></div>
        <div class="cell sortable">Title</div>
        <div class="cell sortable">Address</div>
        <div class="cell views sortable">Views</div>
      </div>
      <div class="list-scroll" id="listScroll">
        <!-- Rows injected here -->
      </div>
    </section>

    <aside class="sidebar" id="sidebar">
      <div>
        <div class="side-date" id="sideDate">3/28/2026 – 4/14/2026</div>
      </div>

      <section class="card">
        <h3 class="side-section-title">Browsing Activity</h3>
        <div id="activityChart"></div>
        <div class="chart-legend">
          <span class="item"><span class="swatch" style="background:var(--amber)"></span>Page Views: <b id="legendViews">26</b></span>
          <span class="item"><span class="swatch" style="background:var(--cyan)"></span>Pages: <b id="legendPages">17</b></span>
        </div>
      </section>

      <section class="card">
        <h3 class="side-section-title">Link Transition Type</h3>
        <div id="donutChart"></div>
      </section>

      <section class="card">
        <h3 class="side-section-title">Top Domains <span class="muted" id="topDomainsTotal">of 8 Total</span></h3>
        <div id="domainList"></div>
      </section>
    </aside>
  </div>
</div>

<!-- Tooltip -->
<div class="tip" id="tip"></div>

<!-- Tweaks panel -->
<div class="tweaks-panel" id="tweaksPanel">
  <h3>Tweaks</h3>
  <div class="tweak-row">

const TRANSITIONS = ['typed', 'link', 'reload', 'form'];

function seedRand(seed) {
  let s = seed >>> 0;
  return () => {
    s = Math.imul(s ^ (s >>> 15), 0x85ebca6b);
    s = Math.imul(s ^ (s >>> 13), 0xc2b2ae35);
    s ^= s >>> 16;
    return (s >>> 0) / 4294967296;
  };
}

function pad(n) { return String(n).padStart(2, '0'); }
function formatTime(d) { return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`; }
function formatDateLong(d) {
  const weekdays = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return `${weekdays[d.getDay()]}, ${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}
function formatShortDate(d) {
  return `${d.getMonth()+1}/${d.getDate()}/${d.getFullYear()}`;
}

function generateHistory() {
  const rand = seedRand(42);
  const items = [];
  // Generate entries across all of April 2026 so Week + Month views have density.
  // Apr 14 = "today"; we want activity from Apr 1 → Apr 18 (current week + prior weeks).
  const endDate = new Date(2026, 3, 14, 23, 59, 59);
  // Cover Apr 1 (13 back) through Apr 18 (4 ahead shown in week). Include most days.
  // Use a weekday-heavy / weekend-light pattern. Positive = days back from today, negative = ahead.
  // Weighted counts let us vary density realistically.
  const dayPlan = [
    // daysOffset (from today Apr 14), item count multiplier
    { off:  4, weight: 0.4 }, // Apr 18 Sat (future but shown in week view — light)
    { off:  3, weight: 0.5 }, // Apr 17 Fri
    { off:  2, weight: 0.6 }, // Apr 16 Thu
    { off:  1, weight: 0.7 }, // Apr 15 Wed
    { off:  0, weight: 1.0 }, // Apr 14 Tue (today)
    { off: -1, weight: 0.9 }, // Apr 13 Mon
    { off: -2, weight: 0.3 }, // Apr 12 Sun
    { off: -3, weight: 0.8 }, // Apr 11 Sat — unused by weekdays, keep variety
    { off: -4, weight: 1.1 }, // Apr 10 Fri
    { off: -5, weight: 0.9 }, // Apr 9 Thu
    { off: -6, weight: 0.7 }, // Apr 8 Wed
    { off: -7, weight: 0.5 }, // Apr 7 Tue
    { off: -8, weight: 0.4 }, // Apr 6 Mon
    { off: -9, weight: 0.2 }, // Apr 5 Sun
    { off:-10, weight: 0.6 }, // Apr 4 Sat
    { off:-11, weight: 1.0 }, // Apr 3 Fri — big day (seen in reference)
    { off:-12, weight: 0.8 }, // Apr 2 Thu
    { off:-13, weight: 0.5 }, // Apr 1 Wed
    { off:-17, weight: 1.2 }, // Mar 28 Sat — big day (seen in reference)
  ];
  let id = 1;
  dayPlan.forEach(plan => {
    const dayDate = new Date(endDate);
    dayDate.setDate(endDate.getDate() - plan.off);
    const itemCount = Math.max(1, Math.round((3 + rand() * 7) * plan.weight));
    // Choose active hour windows
    const hourWindows = [9, 13, 15, 17, 20, 22];
    for (let i = 0; i < itemCount; i++) {
      const host = DOMAINS[Math.floor(rand() * Math.min(DOMAINS.length, 10))];
      const titles = TITLES_BY_HOST[host.host] || [['Untitled', '/']];
      const pick = titles[Math.floor(rand() * titles.length)];
      const hr = hourWindows[Math.floor(rand() * hourWindows.length)];
      const mn = Math.floor(rand() * 60);
      const sc = Math.floor(rand() * 60);
      const d = new Date(dayDate);
      d.setHours(hr, mn, sc, 0);
      const views = 1 + Math.floor(rand() * (rand() > 0.8 ? 5 : 2));
      const transition = TRANSITIONS[Math.floor(rand() * (rand() > 0.7 ? 4 : 2))];
      items.push({
        id: id++,
        time: d,
        title: pick[0],
        url: `https://${host.host}${pick[1]}`,
        host: host,
        views,
        transition,
      });
    }
  });
  // sort desc by time
  items.sort((a, b) => b.time - a.time);
  return items;
}

const HISTORY = generateHistory();

/* ------------------ Rendering: List view ------------------ */
function groupByDay(items) {
  const groups = new Map();
  items.forEach(it => {
    const key = `${it.time.getFullYear()}-${it.time.getMonth()}-${it.time.getDate()}`;
    if (!groups.has(key)) groups.set(key, { date: new Date(it.time.getFullYear(), it.time.getMonth(), it.time.getDate()), items: [] });
    groups.get(key).items.push(it);
  });
  return [...groups.values()];
}

function renderList(filter = '') {
  const container = document.getElementById('listScroll');
  container.innerHTML = '';
  const filtered = HISTORY.filter(it => {
    if (!filter) return true;
    const q = filter.toLowerCase();
    return it.title.toLowerCase().includes(q) || it.url.toLowerCase().includes(q) || it.host.host.toLowerCase().includes(q);
  });
  const groups = groupByDay(filtered);
  if (groups.length === 0) {
    container.innerHTML = `<div class="view-stub">No history matches “${escapeHtml(filter)}”</div>`;
    return;
  }
  groups.forEach(g => {
    const total = g.items.reduce((s, it) => s + it.views, 0);
    const groupEl = document.createElement('div');
    groupEl.className = 'day-group';
    const head = document.createElement('div');
    head.className = 'day-head';
    head.innerHTML = `
      <div class="label">${formatDateLong(g.date)}</div>
      <div class="total">views <b>${total}</b></div>
    `;
    groupEl.appendChild(head);

    g.items.forEach(it => {
      const row = document.createElement('div');
      row.className = 'row';
      const favColor = it.host.color;
      const badgeClass = it.views >= 3 ? 'badge hot' : 'badge';
      row.innerHTML = `
        <div class="time mono">${formatTime(it.time)}</div>
        <div class="title-cell">
          <span class="fav" style="background:${favColor}">${it.host.letter}</span>
          <span class="title">${escapeHtml(it.title)}</span>
        </div>
        <div class="url mono">${escapeHtml(truncateUrl(it.url, 56))}</div>
        <div class="views-cell"><span class="${badgeClass}">${it.views}</span></div>
      `;
      groupEl.appendChild(row);
    });
    container.appendChild(groupEl);
  });
}

function truncateUrl(url, max) {
  if (url.length <= max) return url;
  return url.slice(0, max - 1) + '…';
}
function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ------------------ Charts: Browsing Activity ------------------ */
function renderActivityChart() {
  const el = document.getElementById('activityChart');
  el.innerHTML = '';
  // 12 buckets (days)
  const buckets = Array.from({length: 12}, (_, i) => ({ pages: 0, views: 0, label: '' }));
  const endDate = new Date(2026, 3, 14);
  // label each bucket by date, going back
  const labels = ['Apr 3','Apr 4','Apr 5','Apr 6','Apr 7','Apr 8','Apr 9','Apr 10','Apr 11','Apr 12','Apr 13','Apr 14'];
  buckets.forEach((b, i) => b.label = labels[i]);
  HISTORY.forEach(it => {
    const diffDays = Math.floor((endDate - new Date(it.time.getFullYear(), it.time.getMonth(), it.time.getDate())) / (1000*60*60*24));
    const idx = 11 - diffDays;
    if (idx >= 0 && idx < 12) {
      buckets[idx].pages += 1;
      buckets[idx].views += it.views;
    }
  });

  const W = 300, H = 130, PL = 28, PR = 8, PT = 8, PB = 28;
  const iw = W - PL - PR;
  const ih = H - PT - PB;
  const maxY = Math.max(10, ...buckets.map(b => Math.max(b.pages, b.views)));
  const yTicks = [0, Math.round(maxY/2), maxY];

  const svgNS = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(svgNS, 'svg');
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.setAttribute('width', '100%');
  svg.setAttribute('style', 'display:block');

  // gridlines + y labels
  yTicks.forEach(t => {
    const y = PT + ih - (t / maxY) * ih;
    const line = document.createElementNS(svgNS, 'line');
    line.setAttribute('x1', PL); line.setAttribute('x2', W - PR);
    line.setAttribute('y1', y); line.setAttribute('y2', y);
    line.setAttribute('stroke', 'oklch(0.28 0.012 260)');
    line.setAttribute('stroke-dasharray', '2 3');
    svg.appendChild(line);
    const label = document.createElementNS(svgNS, 'text');
    label.setAttribute('x', PL - 6); label.setAttribute('y', y + 3);
    label.setAttribute('text-anchor', 'end');
    label.setAttribute('font-size', '9');
    label.setAttribute('font-family', 'JetBrains Mono, monospace');
    label.setAttribute('fill', 'oklch(0.55 0.012 260)');
    label.textContent = t.toFixed(1);
    svg.appendChild(label);
  });

  const bw = iw / buckets.length;

  if (tweaks.chart === 'area') {
    // filled overlapping areas for pages + views
    const areaPath = (key, color, opacity) => {
      let d = `M ${PL} ${PT + ih}`;
      buckets.forEach((b, i) => {
        const x = PL + i * bw + bw / 2;
        const y = PT + ih - (b[key] / maxY) * ih;
        d += ` L ${x} ${y}`;
      });
      d += ` L ${PL + iw} ${PT + ih} Z`;
      const p = document.createElementNS(svgNS, 'path');
      p.setAttribute('d', d);
      p.setAttribute('fill', color);
      p.setAttribute('fill-opacity', opacity);
      p.setAttribute('stroke', color);
      p.setAttribute('stroke-width', '1.2');
      svg.appendChild(p);
    };
    areaPath('pages', 'oklch(0.78 0.12 220)', 0.35);
    areaPath('views', 'oklch(0.78 0.14 75)', 0.35);
  } else {
    // dual bars
    buckets.forEach((b, i) => {
      const cx = PL + i * bw + bw / 2;
      const half = Math.max(2, bw * 0.32);
      // views (amber) behind
      const vh = (b.views / maxY) * ih;
      const ph = (b.pages / maxY) * ih;
      const rV = document.createElementNS(svgNS, 'rect');
      rV.setAttribute('x', cx - half - 1);
      rV.setAttribute('y', PT + ih - vh);
      rV.setAttribute('width', half);
      rV.setAttribute('height', vh);
      rV.setAttribute('fill', 'oklch(0.78 0.14 75)');
      rV.setAttribute('rx', '1');
      svg.appendChild(rV);
      const rP = document.createElementNS(svgNS, 'rect');
      rP.setAttribute('x', cx + 1);
      rP.setAttribute('y', PT + ih - ph);
      rP.setAttribute('width', half);
      rP.setAttribute('height', ph);
      rP.setAttribute('fill', 'oklch(0.78 0.12 220)');
      rP.setAttribute('rx', '1');
      svg.appendChild(rP);

      // hover hit area
      const hit = document.createElementNS(svgNS, 'rect');
      hit.setAttribute('x', PL + i * bw);
      hit.setAttribute('y', PT);
      hit.setAttribute('width', bw);
      hit.setAttribute('height', ih);
      hit.setAttribute('fill', 'transparent');
      hit.style.cursor = 'default';
      hit.addEventListener('mousemove', e => showTip(e, `${b.label} · views ${b.views} · pages ${b.pages}`));
      hit.addEventListener('mouseleave', hideTip);
      svg.appendChild(hit);
    });
  }

  // x labels (every other)
  buckets.forEach((b, i) => {
    if (i % 2 !== 0 && i !== buckets.length - 1) return;
    const x = PL + i * bw + bw / 2;
    const t = document.createElementNS(svgNS, 'text');
    t.setAttribute('x', x);
    t.setAttribute('y', H - 10);
    t.setAttribute('text-anchor', 'middle');
    t.setAttribute('font-size', '9');
    t.setAttribute('font-family', 'JetBrains Mono, monospace');
    t.setAttribute('fill', 'oklch(0.55 0.012 260)');
    t.setAttribute('transform', `rotate(-30 ${x} ${H - 10})`);
    t.textContent = b.label;
    svg.appendChild(t);
  });

  el.appendChild(svg);

  const totalPages = buckets.reduce((s, b) => s + b.pages, 0);
  const totalViews = buckets.reduce((s, b) => s + b.views, 0);
  document.getElementById('legendViews').textContent = totalViews;
  document.getElementById('legendPages').textContent = totalPages;
}

/* ------------------ Donut: Link Transition Type ------------------ */
function renderDonut() {
  const el = document.getElementById('donutChart');
  el.innerHTML = '';
  const counts = { typed: 0, link: 0, reload: 0, form: 0 };
  HISTORY.forEach(it => counts[it.transition] += 1);
  const total = Object.values(counts).reduce((a,b) => a+b, 0);
  const data = [
    { key: 'typed',  label: 'Typed',  color: 'oklch(0.72 0.16 295)', val: counts.typed },
    { key: 'link',   label: 'Link',   color: 'oklch(0.72 0.15 25)',  val: counts.link },
    { key: 'reload', label: 'Reload', color: 'oklch(0.78 0.14 75)',  val: counts.reload },
    { key: 'form',   label: 'Form',   color: 'oklch(0.78 0.12 220)', val: counts.form },
  ];

  const W = 300, H = 150;
  const cx = 95, cy = H / 2, r = 55, ir = 38;
  const svgNS = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(svgNS, 'svg');
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.setAttribute('width', '100%');
  svg.setAttribute('style', 'display:block');

  let angle = -Math.PI / 2;
  data.forEach(d => {
    const frac = d.val / total;
    const end = angle + frac * Math.PI * 2;
    const large = frac > 0.5 ? 1 : 0;
    const x1 = cx + Math.cos(angle) * r, y1 = cy + Math.sin(angle) * r;
    const x2 = cx + Math.cos(end) * r,   y2 = cy + Math.sin(end) * r;
    const x3 = cx + Math.cos(end) * ir,  y3 = cy + Math.sin(end) * ir;
    const x4 = cx + Math.cos(angle) * ir,y4 = cy + Math.sin(angle) * ir;
    const path = document.createElementNS(svgNS, 'path');
    path.setAttribute('d', `M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} L ${x3} ${y3} A ${ir} ${ir} 0 ${large} 0 ${x4} ${y4} Z`);
    path.setAttribute('fill', d.color);
    path.setAttribute('stroke', 'var(--bg-0)');
    path.setAttribute('stroke-width', '1.5');
    path.addEventListener('mousemove', e => showTip(e, `${d.label} · ${d.val} (${Math.round(frac*100)}%)`));
    path.addEventListener('mouseleave', hideTip);
    svg.appendChild(path);
    angle = end;
  });

  // center total
  const tTotal = document.createElementNS(svgNS, 'text');
  tTotal.setAttribute('x', cx); tTotal.setAttribute('y', cy - 2);
  tTotal.setAttribute('text-anchor', 'middle');
  tTotal.setAttribute('font-size', '18');
  tTotal.setAttribute('font-weight', '600');
  tTotal.setAttribute('font-family', 'Inter, sans-serif');
  tTotal.setAttribute('fill', 'oklch(0.96 0.005 260)');
  tTotal.textContent = total;
  svg.appendChild(tTotal);
  const tLabel = document.createElementNS(svgNS, 'text');
  tLabel.setAttribute('x', cx); tLabel.setAttribute('y', cy + 14);
  tLabel.setAttribute('text-anchor', 'middle');
  tLabel.setAttribute('font-size', '9');
  tLabel.setAttribute('font-family', 'JetBrains Mono, monospace');
  tLabel.setAttribute('fill', 'oklch(0.55 0.012 260)');
  tLabel.setAttribute('letter-spacing', '1');
  tLabel.textContent = 'TOTAL';
  svg.appendChild(tLabel);

  // legend inside SVG
  data.forEach((d, i) => {
    const lx = 180, ly = 36 + i * 20;
    const sw = document.createElementNS(svgNS, 'rect');
    sw.setAttribute('x', lx); sw.setAttribute('y', ly - 7);
    sw.setAttribute('width', 10); sw.setAttribute('height', 10);
    sw.setAttribute('rx', 2);
    sw.setAttribute('fill', d.color);
    svg.appendChild(sw);
    const t = document.createElementNS(svgNS, 'text');
    t.setAttribute('x', lx + 16); t.setAttribute('y', ly + 1);
    t.setAttribute('font-size', '11');
    t.setAttribute('font-family', 'Inter, sans-serif');
    t.setAttribute('fill', 'oklch(0.82 0.01 260)');
    t.textContent = d.label;
    svg.appendChild(t);
    const n = document.createElementNS(svgNS, 'text');
    n.setAttribute('x', W - 10); n.setAttribute('y', ly + 1);
    n.setAttribute('text-anchor', 'end');
    n.setAttribute('font-size', '10');
    n.setAttribute('font-family', 'JetBrains Mono, monospace');
    n.setAttribute('fill', 'oklch(0.62 0.012 260)');
    n.textContent = d.val;
    svg.appendChild(n);
  });

  el.appendChild(svg);
}

/* ------------------ Top Domains ------------------ */
function renderDomains() {
  const el = document.getElementById('domainList');
  el.innerHTML = '';
  const counts = new Map();
  HISTORY.forEach(it => {
    const k = it.host.host;
    counts.set(k, (counts.get(k) || 0) + it.views);
  });
  const sorted = [...counts.entries()].map(([host, count]) => {
    const meta = DOMAINS.find(d => d.host === host);
    return { host, count, meta };
  }).sort((a,b) => b.count - a.count);
  const top = sorted.slice(0, 6);
  document.getElementById('topDomainsTotal').textContent = `of ${sorted.length} Total`;
  top.forEach(d => {
    const row = document.createElement('div');
    row.className = 'domain-row';
    row.innerHTML = `
      <span class="dot" style="background:${d.meta.color}">${d.meta.letter}</span>
      <span class="d-name">${escapeHtml(d.host)}</span>
      <span class="d-count">${d.count}</span>
    `;
    el.appendChild(row);
  });
}

/* ------------------ Tooltip ------------------ */
const tip = document.getElementById('tip');
function showTip(e, txt) {
  tip.textContent = txt;
  tip.style.left = e.clientX + 'px';
  tip.style.top = e.clientY + 'px';
  tip.classList.add('show');
}
function hideTip() { tip.classList.remove('show'); }

/* ------------------ Views: Day / Week / Month ------------------ */
function renderDay() {
  const list = document.getElementById('listScroll');
  // take most recent day only
  const groups = groupByDay(HISTORY);
  const today = groups[0];
  list.innerHTML = '';
  const g = today;
  const total = g.items.reduce((s, it) => s + it.views, 0);
  const head = document.createElement('div');
  head.className = 'day-head';
  head.innerHTML = `
    <div class="label">${formatDateLong(g.date)}</div>
    <div class="total">views <b>${total}</b></div>
  `;
  list.appendChild(head);
  g.items.forEach(it => {
    const row = document.createElement('div');
    row.className = 'row';
    const badgeClass = it.views >= 3 ? 'badge hot' : 'badge';
    row.innerHTML = `
      <div class="time mono">${formatTime(it.time)}</div>
      <div class="title-cell">
        <span class="fav" style="background:${it.host.color}">${it.host.letter}</span>
        <span class="title">${escapeHtml(it.title)}</span>
      </div>
      <div class="url mono">${escapeHtml(truncateUrl(it.url, 56))}</div>
      <div class="views-cell"><span class="${badgeClass}">${it.views}</span></div>
    `;
    list.appendChild(row);
  });
}

function renderWeek() {
  // Build Sunday Apr 12 – Saturday Apr 18, 2026
  const weekStart = new Date(2026, 3, 12);
  const container = document.getElementById('listScroll');
  container.innerHTML = '';
  // Hide col-header by replacing scroll area; but keep header visible for simplicity
  const grid = document.createElement('div');
  grid.className = 'week-grid';
  grid.style.height = '100%';
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  for (let i = 0; i < 7; i++) {
    const d = new Date(weekStart);
    d.setDate(weekStart.getDate() + i);
    const dayItems = HISTORY.filter(h =>
      h.time.getFullYear() === d.getFullYear() &&
      h.time.getMonth() === d.getMonth() &&
      h.time.getDate() === d.getDate()
    );
    const col = document.createElement('div');
    col.className = 'week-col';
    const head = document.createElement('div');
    head.className = 'week-col-head';
    head.innerHTML = `<b>${days[i].slice(0,3)}</b>${months[d.getMonth()]} ${d.getDate()}`;
    col.appendChild(head);
    const body = document.createElement('div');
    body.className = 'week-col-body';
    dayItems.forEach(it => {
      const item = document.createElement('div');
      item.className = 'week-item';
      item.innerHTML = `
        <span class="fav" style="background:${it.host.color}">${it.host.letter}</span>
        <span class="ww-title">${escapeHtml(it.title)}</span>
        <span class="ww-count">${it.views}</span>
      `;
      body.appendChild(item);
    });
    col.appendChild(body);
    grid.appendChild(col);
  }
  container.appendChild(grid);
}

function renderMonth() {
  const container = document.getElementById('listScroll');
  container.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'month-wrap';
  // weekday header row
  const weekdayRow = document.createElement('div');
  weekdayRow.className = 'month-weekday-row';
  ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'].forEach(d => {
    const c = document.createElement('div');
    c.className = 'month-weekday-head';
    c.textContent = d;
    weekdayRow.appendChild(c);
  });
  wrap.appendChild(weekdayRow);
  // month: April 2026; start Sunday before Apr 1
  const first = new Date(2026, 3, 1);
  const startOffset = first.getDay();
  const gridStart = new Date(2026, 3, 1 - startOffset);
  const grid = document.createElement('div');
  grid.className = 'month-grid';
  for (let i = 0; i < 42; i++) {
    const d = new Date(gridStart);
    d.setDate(gridStart.getDate() + i);
    const inMonth = d.getMonth() === 3;
    const isToday = d.getFullYear() === 2026 && d.getMonth() === 3 && d.getDate() === 14;
    const cell = document.createElement('div');
    cell.className = 'month-cell' + (inMonth ? '' : ' other-month') + (isToday ? ' today' : '');
    const dayItems = HISTORY.filter(h =>
      h.time.getFullYear() === d.getFullYear() &&
      h.time.getMonth() === d.getMonth() &&
      h.time.getDate() === d.getDate()
    );
    const dateLabel = document.createElement('div');
    dateLabel.className = 'mc-date';
    dateLabel.textContent = d.getDate();
    cell.appendChild(dateLabel);
    if (inMonth && dayItems.length) {
      const views = dayItems.reduce((s, it) => s + it.views, 0);
      const pages = dayItems.length;
      const pill = document.createElement('div');
      pill.className = 'mc-dot' + (views < 5 ? ' cyan' : '');
      pill.innerHTML = `<b style="color:var(--fg-0);font-weight:600">${views}</b> views<br/><b style="color:var(--fg-0);font-weight:600">${pages}</b> pages`;
      cell.appendChild(pill);
      // domain hints
      const hints = [...new Set(dayItems.slice(0,3).map(it => it.host.host))].slice(0,2);
      hints.forEach(h => {
        const line = document.createElement('div');
        line.style.fontFamily = 'JetBrains Mono, monospace';
        line.style.fontSize = '10px';
        line.style.color = 'var(--fg-3)';
        line.style.overflow = 'hidden';
        line.style.textOverflow = 'ellipsis';
        line.style.whiteSpace = 'nowrap';
        line.textContent = h;
        cell.appendChild(line);
      });
    }
    grid.appendChild(cell);
  }
  wrap.appendChild(grid);
  container.appendChild(wrap);
}

/* ------------------ View switching ------------------ */
function setView(view) {
  document.querySelectorAll('#viewSeg button').forEach(b => b.classList.toggle('on', b.dataset.view === view));
  const colHeader = document.getElementById('colHeader');
  if (view === 'list' || view === 'day') {
    colHeader.style.display = 'grid';
  } else {
    colHeader.style.display = 'none';
  }
  const ranges = {
    list: '3/28/2026 – 4/14/2026',
    day: 'April 14, 2026',
    week: 'Week 15, 2026',
    month: 'April 2026',
  };
  document.getElementById('rangeLabel').textContent = ranges[view];
  const todayLabels = { list: 'Today', day: 'Today', week: 'This Week', month: 'This Month' };
  document.getElementById('todayLabel').textContent = todayLabels[view];

  if (view === 'list') renderList(document.getElementById('searchInput').value);
  else if (view === 'day') renderDay();
  else if (view === 'week') renderWeek();
  else if (view === 'month') renderMonth();
}

/* ------------------ Tweaks ------------------ */
function applyTweaks() {
  const root = document.documentElement;
  const accentMap = {
    amber: 'oklch(0.78 0.14 75)',
    cyan: 'oklch(0.78 0.12 220)',
    violet: 'oklch(0.72 0.16 295)',
    green: 'oklch(0.78 0.14 150)',
    coral: 'oklch(0.72 0.16 25)',
  };
  root.style.setProperty('--amber', accentMap[tweaks.accent] || accentMap.amber);

  // density
  const rowH = { compact: '28px', cozy: '32px', comfortable: '34px' }[tweaks.density] || '34px';
  document.querySelectorAll('.row').forEach(r => r.style.height = rowH);

  // zebra
  if (tweaks.zebra === 'on') {
    document.querySelectorAll('.day-group').forEach(g => {
      [...g.querySelectorAll('.row')].forEach((r, i) => {
        r.style.background = i % 2 === 1 ? 'var(--bg-row-alt)' : '';
      });
    });
  } else {
    document.querySelectorAll('.row').forEach(r => r.style.background = '');
  }

  renderActivityChart();
}

/* ------------------ Edit mode hookup ------------------ */
window.addEventListener('message', (e) => {
  const data = e.data || {};
  if (data.type === '__activate_edit_mode') {
    document.getElementById('tweaksPanel').classList.add('open');
  } else if (data.type === '__deactivate_edit_mode') {
    document.getElementById('tweaksPanel').classList.remove('open');
  }
});
try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch (_) {}

function pushEdit(k, v) {
  try { window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*'); } catch (_) {}
}

/* ------------------ Init ------------------ */
document.getElementById('searchInput').addEventListener('input', e => {
  const view = document.querySelector('#viewSeg button.on').dataset.view;
  if (view === 'list') renderList(e.target.value);
});
document.querySelectorAll('#viewSeg button').forEach(b => {
  b.addEventListener('click', () => setView(b.dataset.view));
});
document.getElementById('tweaksBtn').addEventListener('click', () => {
  document.getElementById('tweaksPanel').classList.toggle('open');
});

// Tweak inputs
['accent','density','zebra','chart'].forEach(k => {
  const el = document.getElementById('tweak' + k.charAt(0).toUpperCase() + k.slice(1));
  el.value = tweaks[k];
  el.addEventListener('change', () => {
    tweaks[k] = el.value;
    applyTweaks();
    pushEdit(k, el.value);
  });
});

renderList();
renderActivityChart();
renderDonut();
renderDomains();
applyTweaks();
</script>
</body>
</html>
